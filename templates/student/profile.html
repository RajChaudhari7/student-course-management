{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">

            <h3>

                <i class="bi bi-person-circle"></i>

                My Profile

            </h3>

        </div>

        <div class="card-body">

            <div class="text-center mb-4">

                <img src="{{ url_for('static', filename='uploads/profile/' + profile[5]) }}"
                    class="rounded-circle shadow" width="160" height="160" style="object-fit:cover;">

            </div>

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">

                    <label>Full Name</label>

                    <input type="text" name="full_name" class="form-control" value="{{ profile[0] }}" required>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input type="email" class="form-control" value="{{ profile[1] }}" readonly>

                </div>

                <div class="mb-3">

                    <label>Phone</label>

                    <input type="text" name="phone" class="form-control" value="{{ profile[2] }}" required>

                </div>

                <div class="mb-3">

                    <label>Department</label>

                    <input type="text" name="department" class="form-control" value="{{ profile[3] }}" required>

                </div>

                <div class="mb-3">

                    <label>Semester</label>

                    <input type="number" name="semester" class="form-control" value="{{ profile[4] }}" required>

                </div>

                <div class="mb-3">

                    <label>Profile Picture</label>

                    <input type="file" name="profile_image" class="form-control" accept="image/*">

                </div>

                <button class="btn btn-success">

                    <i class="bi bi-check-circle"></i>

                    Update Profile

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
