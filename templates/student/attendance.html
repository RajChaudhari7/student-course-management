{% extends 'base.html' %}

{% block content %}

<h2>

    My Attendance

</h2>

<div class="card shadow">

    <div class="card-body">

        <table id="attendanceTable" class="table table-hover">

            <thead>

                <tr>

                    <th>Date</th>

                    <th>Status</th>

                </tr>

            </thead>

            <tbody>

                {% for row in records %}

                <tr>

                    <td>{{ row.attendance_date }}</td>

                    <td>

                        {% if row.status=="Present" %}

                        <span class="badge bg-success">

                            Present

                        </span>

                        {% else %}

                        <span class="badge bg-danger">

                            Absent

                        </span>

                        {% endif %}

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
