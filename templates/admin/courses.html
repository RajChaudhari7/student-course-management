{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>
        <h2><i class="bi bi-book-fill"></i> Course Management</h2>
        <small class="text-muted">Manage all available courses.</small>
    </div>

    <a href="/admin/course/add" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Add Course
    </a>


    <div class="mb-3">

        <a href="/admin/export/courses/excel" class="btn btn-success">

            <i class="bi bi-file-earmark-excel"></i>

            Export Excel

        </a>

        <a href="/admin/export/courses/pdf" class="btn btn-danger">

            <i class="bi bi-file-earmark-pdf"></i>

            Export PDF

        </a>

    </div>
</div>

<div class="card shadow border-0">

    <div class="card-body">

        <table id="coursesTable" class="table table-hover align-middle">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Course Name</th>
                    <th>Course Code</th>
                    <th>Credits</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                {% for course in courses %}

                <tr>

                    <td>{{ course[0] }}</td>

                    <td><strong>{{ course[1] }}</strong></td>

                    <td>
                        <span class="badge bg-info">
                            {{ course[2] }}
                        </span>
                    </td>

                    <td>
                        <span class="badge bg-success">
                            {{ course[3] }}
                        </span>
                    </td>

                    <td>

                        <a href="/admin/course/edit/{{course[0]}}" class="btn btn-warning btn-sm">

                            <i class="bi bi-pencil-square"></i>

                        </a>

                        <button class="btn btn-danger btn-sm delete-course"
                            data-url="/admin/course/delete/{{course[0]}}">

                            <i class="bi bi-trash"></i>

                        </button>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
