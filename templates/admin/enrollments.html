{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2>

            <i class="bi bi-journal-check"></i>

            Enrollments

        </h2>

        <small class="text-muted">

            View all student enrollments.

        </small>

    </div>

    <a href="/admin/enroll" class="btn btn-primary">

        <i class="bi bi-plus-circle"></i>

        Assign Course

    </a>

</div>

<div class="card shadow border-0">

    <div class="card-body">

        <table id="enrollmentTable" class="table table-hover align-middle">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Student</th>
                    <th>Department</th>
                    <th>Course</th>
                    <th>Code</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                {% for e in enrollments %}

                <tr>

                    <td>{{e[0]}}</td>

                    <td><strong>{{e[1]}}</strong></td>

                    <td>{{e[2]}}</td>

                    <td>{{e[3]}}</td>

                    <td>

                        <span class="badge bg-primary">

                            {{e[4]}}

                        </span>

                    </td>

                    <td>

                        <button class="btn btn-danger btn-sm delete-enrollment"
                            data-url="/admin/enrollment/delete/{{e[0]}}">

                            <i class="bi bi-trash"></i>

                        </button>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
