{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-warning">

        <h3>

            Edit Marks

        </h3>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label>Marks</label>

                <input type="number" name="marks" class="form-control" min="0" max="100" value="{{ mark.marks }}"
                    required>

            </div>

            <button class="btn btn-success">

                Update

            </button>

        </form>

    </div>

</div>

{% endblock %}
